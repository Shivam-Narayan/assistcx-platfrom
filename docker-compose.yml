services:
  # Core backend service
  backend-core:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: backend-core
    labels:
      logging: promtail
    networks:
      - assistcx
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=backend-core
    depends_on:
      - postgres
      - redis
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000')",
        ]
      interval: 60s
      timeout: 10s
      retries: 3

  # Celery worker for attachment and OCR
  attachment-worker:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: attachment-worker
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker worker -Q attachment_queue -l info --autoscale=${ATTACHMENT_WORKER_CONCURRENCY:-2},1 --max-tasks-per-child=10 -n attachment_worker@%n
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=attachment-worker
      - DOCTR_MULTIPROCESSING_DISABLE='TRUE'
    cpus: "${ATTACHMENT_WORKER_CPU:-1}"
    mem_reservation: ${ATTACHMENT_WORKER_MEMORY:-4096}m
  knowledge-worker:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: knowledge-worker
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker worker -Q knowledge_queue -l info --autoscale=${KNOWLEDGE_WORKER_CONCURRENCY:-2},1 --max-tasks-per-child=10 -n knowledge_worker@%n
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=knowledge-worker
      - DOCLING_NUM_THREADS=${KNOWLEDGE_WORKER_CPU:-1}
      - OMP_NUM_THREADS=${KNOWLEDGE_WORKER_CPU:-1}
      - TOKENIZERS_PARALLELISM=false
    cpus: "${KNOWLEDGE_WORKER_CPU:-1}"
    mem_reservation: ${KNOWLEDGE_WORKER_MEMORY:-4096}m

  # Celery worker for agent execution
  agent-worker:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: agent-worker
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker worker -Q agent_queue -l info --autoscale=${AGENT_WORKER_CONCURRENCY:-2},1 --max-tasks-per-child=100 -n agent_worker@%n
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=agent-worker
    cpus: "${AGENT_WORKER_CPU:-1}"

  # Default backend worker
  backend-worker:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: backend-worker
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker worker -Q celery -l info --autoscale=${BACKEND_WORKER_CONCURRENCY:-2},1 --max-tasks-per-child=100 -n backend_worker@%n
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    depends_on:
      - redis
      - postgres
      - attachment-worker
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=backend-worker
    cpus: "${BACKEND_WORKER_CPU:-1}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Celery beat scheduler
  celery-beat:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: celery-beat
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker beat -l info --scheduler redbeat.RedBeatScheduler --pidfile /tmp/celerybeat.pid
    volumes:
      - ./backend:/app
      - ${STORAGE_MOUNT_VOLUME}
    depends_on:
      redis:
        condition: service_healthy
      attachment-worker:
        condition: service_started
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=celery-beat
    restart: unless-stopped

  # Application database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    command: postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-250} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
    shm_size: ${POSTGRES_SHM_SIZE:-2gb}
    labels:
      logging: promtail
    networks:
      - assistcx
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    mem_reservation: ${POSTGRES_SERVER_MEMORY:-2048}m
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for Celery queue
  redis:
    image: redis:alpine
    container_name: redis
    labels:
      logging: promtail
    networks:
      - assistcx
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    mem_reservation: ${REDIS_SERVER_MEMORY:-512}m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # etcd service
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd --advertise-client-urls=http://etcd:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "2379:2379"
    networks:
      - assistcx

  # Minio service
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - assistcx

  # Milvus service
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.16
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - MILVUS_USERNAME=${MILVUS_USERNAME}
      - MILVUS_PASSWORD=${MILVUS_PASSWORD}
      - MILVUS_LOG_LEVEL=warn
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - assistcx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis client
  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    labels:
      logging: promtail
    networks:
      - assistcx
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=redis:redis:6379
      - HTTP_USER=${PLATFORM_ROOT_USER}
      - HTTP_PASSWORD=${PLATFORM_ROOT_PASSWORD}
    ports:
      - "8081:8081"

  # PGAdmin for Postgres administration
  pgadmin:
    container_name: pgadmin
    hostname: pgadmin
    image: dpage/pgadmin4
    labels:
      logging: promtail
    networks:
      - assistcx
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PLATFORM_ROOT_USER}
      PGADMIN_DEFAULT_PASSWORD: ${PLATFORM_ROOT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Celery worker monitoring
  flower:
    image: vikasr111/assistcx-backend:${IMAGE_VERSION:-latest}
    container_name: flower
    labels:
      logging: promtail
    networks:
      - assistcx
    command: celery -A celery_worker flower --address=0.0.0.0 --port=5555 --debug --basic_auth=${PLATFORM_ROOT_USER}:${PLATFORM_ROOT_PASSWORD}
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - "5555:5555"

  # Loki for log aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - assistcx
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 500M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Promtail - Log Shipper
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    networks:
      - assistcx
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./docker-config.yml:/etc/promtail/docker-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/docker-config.yaml
    deploy:
      resources:
        limits:
          memory: 500M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - assistcx
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${PLATFORM_ROOT_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${PLATFORM_ROOT_PASSWORD}
    ports:
      - "4000:3000"
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 500M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - assistcx
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor

  # cAdvisor - Container Metrics Exporter
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      - assistcx
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  # Nginx services
  nginx:
    image: nginx
    container_name: nginx
    networks:
      - assistcx
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./certs:/etc/ssl/certs:ro
      - ./certs:/etc/ssl/private:ro
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - WEBAPP_DOMAIN=${WEBAPP_DOMAIN}
      - BACKEND_DOMAIN=${BACKEND_DOMAIN}
    depends_on:
      - web-app
      - backend-core
      - grafana
    command: /bin/sh -c "envsubst '$$DOMAIN_NAME $$WEBAPP_DOMAIN $$BACKEND_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web app
  web-app:
    image: vikasr111/assistcx-web:latest
    container_name: web-app
    networks:
      - assistcx
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=web-app
      - BACKEND_URL=${BACKEND_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_BACKEND=${NEXTAUTH_BACKEND}
    depends_on:
      - backend-core
    ports:
      - "3000:3000"

networks:
  assistcx:
    name: assistcx

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
  loki-data:
  grafana-data:
  prometheus-data:
  etcd-data:
  minio-data:
  milvus-data:
